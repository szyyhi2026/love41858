function loadData(){try{let s=localStorage.getItem(STORAGE_KEY);if(s){let p=JSON.parse(s);appData={...appData,...p};if(!appData.profiles)appData.profiles={me:{name:'我',avatar:'',status:'在线'},mj:{name:'MJ',avatar:'',status:'在线'}};if(!appData.coupleMemories)appData.coupleMemories=[];if(!appData.coupleTips)appData.coupleTips=[];if(appData.treeWaterLevel===undefined)appData.treeWaterLevel=0;if(!appData.lastWaterDateMe)appData.lastWaterDateMe='';if(!appData.lastWaterDateMj)appData.lastWaterDateMj='';if(!appData.chatBackground)appData.chatBackground='';if(!appData.customEmojis)appData.customEmojis=[];if(!appData.currentTheme)appData.currentTheme='莫兰迪粉';if(!appData.customTheme)appData.customTheme=null;if(!appData.stories)appData.stories=[];if(!appData.mjSpellText)appData.mjSpellText='';if(!appData.mjStatusPool)appData.mjStatusPool=['在线','忙碌','离开','听歌中 🎵','工作中 💻','休息中 🛏️','睡觉中 🌙','吃饭中 🍜','逛街中 🛍️','发呆中 💭','玩游戏 🎮','想你中 ❤️'];if(!appData.nudgeTextMe)appData.nudgeTextMe='你拍了拍 MJ';if(!appData.nudgeTextMJ)appData.nudgeTextMJ='MJ 拍了拍你';}}catch(e){}if(appData.messages.length===0)seedSampleData();applyChatBackground();applyCurrentTheme();}

function initGomoku(){gomokuBoard=Array.from({length:GOMOKU_SIZE},()=>Array(GOMOKU_SIZE).fill(null));gomokuCurrent='black';gomokuGameOver=false;gomokuLastMove=null;gomokuWinner=null;gomokuWinCells=[];}

function renderGomoku(){let status=gomokuGameOver?(gomokuWinner==='black'?'🏆 黑棋(你) 获胜！':'🏆 白棋(MJ) 获胜！'):`轮到：${gomokuCurrent==='black'?'⚫ 你（黑棋）':'⚪ MJ（白棋）'}`;let h=`<div class="gomoku-info">${status}</div><div class="gomoku-board" id="gomokuBoard">`;for(let r=0;r<GOMOKU_SIZE;r++)for(let c=0;c<GOMOKU_SIZE;c++){let cls='gomoku-cell',piece='';if(gomokuBoard[r][c]){cls+=' occupied';let pc='gomoku-piece '+gomokuBoard[r][c];if(gomokuGameOver&&gomokuWinCells.some(w=>w.row===r&&w.col===c))pc+=' win-highlight';if(gomokuLastMove&&gomokuLastMove.row===r&&gomokuLastMove.col===c&&!(gomokuGameOver&&gomokuWinCells.some(w=>w.row===r&&w.col===c)))pc+=' last-move';piece=`<div class="${pc}"></div>`;}h+=`<div class="${cls}" onclick="gomokuClick(${r},${c})">${piece}</div>`;}h+=`</div><div class="gomoku-actions"><button class="btn-primary" onclick="initGomoku();document.getElementById('fullscreenContent').innerHTML=renderGomoku();">🔄 重新开始</button><button class="btn-secondary" onclick="closeFullscreen()">关闭</button></div>`;return h;}
function gomokuClick(r,c){if(gomokuGameOver||gomokuBoard[r][c]||gomokuCurrent!=='black')return;gomokuBoard[r][c]='black';gomokuLastMove={row:r,col:c};let win=checkGomokuWinStrict(r,c,'black');if(win){gomokuGameOver=true;gomokuWinner='black';gomokuWinCells=win;document.getElementById('fullscreenContent').innerHTML=renderGomoku();return;}gomokuCurrent='white';document.getElementById('fullscreenContent').innerHTML=renderGomoku();setTimeout(()=>{mjGomokuMove();},500+Math.random()*600);}
function mjGomokuMove(){if(gomokuGameOver||gomokuCurrent!=='white')return;let move=findBestMove();if(!move){let empty=[];for(let r=0;r<GOMOKU_SIZE;r++)for(let c=0;c<GOMOKU_SIZE;c++)if(!gomokuBoard[r][c])empty.push({r,c});if(empty.length===0)return;move=empty[Math.floor(Math.random()*empty.length)];}gomokuBoard[move.r][move.c]='white';gomokuLastMove={row:move.r,col:move.c};let win=checkGomokuWinStrict(move.r,move.c,'white');if(win){gomokuGameOver=true;gomokuWinner='white';gomokuWinCells=win;document.getElementById('fullscreenContent').innerHTML=renderGomoku();return;}gomokuCurrent='black';document.getElementById('fullscreenContent').innerHTML=renderGomoku();}
function checkGomokuWinStrict(r,c,color){let dirs=[[0,1],[1,0],[1,1],[1,-1]];for(let[dr,dc]of dirs){let cells=[{row:r,col:c}];for(let i=1;i<5;i++){let nr=r+dr*i,nc=c+dc*i;if(nr>=0&&nr<GOMOKU_SIZE&&nc>=0&&nc<GOMOKU_SIZE&&gomokuBoard[nr][nc]===color)cells.push({row:nr,col:nc});else break;}for(let i=1;i<5;i++){let nr=r-dr*i,nc=c-dc*i;if(nr>=0&&nr<GOMOKU_SIZE&&nc>=0&&nc<GOMOKU_SIZE&&gomokuBoard[nr][nc]===color)cells.unshift({row:nr,col:nc});else break;}if(cells.length>=5){cells.sort((a,b)=>a.row-b.row||a.col-b.col);return cells.slice(0,5);}}return null;}
function findBestMove(){let bestScore=-Infinity,bestMove=null;for(let r=0;r<GOMOKU_SIZE;r++)for(let c=0;c<GOMOKU_SIZE;c++){if(gomokuBoard[r][c])continue;let attack=evaluatePosition(r,c,'white'),defense=evaluatePosition(r,c,'black');let total=attack*0.9+defense*1.2;if(total>bestScore){bestScore=total;bestMove={r,c};}}return bestMove;}
function evaluatePosition(r,c,color){let dirs=[[0,1],[1,0],[1,1],[1,-1]],score=0;gomokuBoard[r][c]=color;for(let[dr,dc]of dirs){let cnt=1,open=0;for(let i=1;i<=5;i++){let nr=r+dr*i,nc=c+dc*i;if(nr>=0&&nr<GOMOKU_SIZE&&nc>=0&&nc<GOMOKU_SIZE&&gomokuBoard[nr][nc]===color)cnt++;else{if(nr>=0&&nr<GOMOKU_SIZE&&nc>=0&&nc<GOMOKU_SIZE&&!gomokuBoard[nr][nc])open++;break;}}for(let i=1;i<=5;i++){let nr=r-dr*i,nc=c-dc*i;if(nr>=0&&nr<GOMOKU_SIZE&&nc>=0&&nc<GOMOKU_SIZE&&gomokuBoard[nr][nc]===color)cnt++;else{if(nr>=0&&nr<GOMOKU_SIZE&&nc>=0&&nc<GOMOKU_SIZE&&!gomokuBoard[nr][nc])open++;break;}}if(cnt>=5)score+=100000;else if(cnt===4&&open>=1)score+=10000;else if(cnt===3&&open>=2)score+=1000;else if(cnt===3&&open>=1)score+=300;else if(cnt===2&&open>=2)score+=100;else if(cnt===2&&open>=1)score+=20;else score+=cnt;}gomokuBoard[r][c]=null;return score;}
function startMJSpellTimer(){clearTimeout(mjSpellTimer);scheduleMJSpell();}

function autoMJSpell(){let len=3+Math.floor(Math.random()*10);let pool='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',r='';for(let i=0;i<len;i++){r+=pool[Math.floor(Math.random()*pool.length)];if(Math.random()<0.25&&i<len-1)r+=' ';}appData.mjSpellText=r;saveData();let o=document.getElementById('fullscreenOverlay');if(o.classList.contains('show')&&document.getElementById('fullscreenTitle').textContent.includes('拼字板')){spellText=appData.mjSpellText;updateSpellDisplay();}}

function renderSpellBoard(){let h=`<div class="spell-display" id="spellDisplay">${spellText||' '}</div><div class="spell-keyboard">`;for(let i=65;i<=90;i++)h+=`<button class="spell-key" onclick="addSpellChar('${String.fromCharCode(i)}')">${String.fromCharCode(i)}</button>`;h+=`</div><div class="spell-keyboard">`;for(let i=0;i<=9;i++)h+=`<button class="spell-key num" onclick="addSpellChar('${i}')">${i}</button>`;h+=`</div><div class="spell-keyboard" style="grid-template-columns:repeat(3,1fr);"><button class="spell-key action" onclick="addSpellChar(' ')">空格</button><button class="spell-key action" onclick="deleteSpellChar()">⌫ 退格</button><button class="spell-key action" onclick="clearSpell()">清除</button></div><div style="margin-top:8px;"><button class="spell-key action" onclick="sendSpellToChat()" style="background:#5cb878;width:100%;">📤 发送到聊天</button></div><p style="font-size:10px;color:var(--text-light);margin-top:6px;">💡 MJ会自己拼字，打开就能看到他的暗号</p>`;return h;}

function cancelStory(){storyMode=false;storyText='';document.getElementById('storyModeBar').classList.remove('show');document.getElementById('storyBtn').classList.remove('active');}
function sendChatMessage(){let input=document.getElementById('chatInput'),raw=input.value.trim();if(!raw)return;if(storyMode){let line=raw.split('\n')[0].trim();if(!line)return;storyText+='👤 我：'+line+'\n';appData.messages.push({id:'msg_'+Date.now(),from:'me',content:line,time:Date.now()});saveData();renderChatMessages();input.value='';document.getElementById('storyTextDisplay').textContent=storyText;setTimeout(()=>{let mjLine=generateStoryLine(line);storyText+='🐱 MJ：'+mjLine+'\n';appData.messages.push({id:'msg_'+Date.now(),from:'mj',content:mjLine,time:Date.now()});saveData();renderChatMessages();document.getElementById('storyTextDisplay').textContent=storyText;},1000+Math.random()*1500);return;}let lines=raw.split('\n').filter(l=>l.trim());let delay=0;lines.forEach((line,idx)=>{setTimeout(()=>{let msg={id:'msg_'+Date.now()+'_'+idx,from:'me',content:line.trim(),time:Date.now()};if(idx===0&&replyTargetId)msg.quoteId=replyTargetId;appData.messages.push(msg);saveData();if(currentPage==='chatWindow')renderChatMessages();if(Math.random()<0.3)setTimeout(()=>simulateMJReply(),800+Math.random()*1500);setTimeout(()=>maybeRecordTip(line.trim()),2000+Math.random()*4000);},delay);delay+=400+Math.random()*600;});if(replyTargetId)cancelReply();input.value='';if(emojiPickerVisible)toggleEmojiPicker();setTimeout(()=>{if(Math.random()<0.7)simulateMJReply();},delay+800);}
function generateStoryLine(prev){let kw=prev.replace(/[，。！？、]/g,' ').split(' ').filter(w=>w.length>=2).pop()||'那里';let c=[`与此同时，${kw}静静地注视着这一切。`,`忽然，${kw}仿佛想起了什么重要的事情。`,`就在这时，一阵风吹过，${kw}微微颤抖了一下。`,`${kw}犹豫了片刻，最终还是迈开了脚步。`,`远处传来了一阵低沉的回声，${kw}不自觉地屏住了呼吸。`,`空气中弥漫着一种难以言喻的气息，${kw}感到心跳加速。`,`不知过了多久，${kw}终于下定决心，向那扇门走去。`,`${kw}抬起头，发现天空中已经布满了星辰。`,`一个熟悉的声音在${kw}耳边响起，温柔而坚定。`,`尽管前路未知，但${kw}知道，自己必须继续前行。`,`${kw}轻轻叹了口气，嘴角却浮现出一丝微笑。`,`周围的景物开始变得模糊，${kw}意识到自己正在进入一个全新的世界。`,`突然，一只温暖的手拍了拍${kw}的肩膀。`,`${kw}转过身，看到了一个意料之外的身影。`,`那一刻，所有的声音都消失了，只剩下${kw}自己的呼吸声。`,`一股暖流涌上${kw}的心头，驱散了所有的恐惧。`,`${kw}深吸一口气，开始讲述那个埋藏在心底的秘密。`,`月光洒在${kw}的脸上，映出了一种坚定而温柔的神情。`,`就在这时，一道耀眼的光芒从${kw}手中绽放。`,`${kw}知道，故事才刚刚开始。`];return c[Math.floor(Math.random()*c.length)];}
function simulateMJReply(){let all=[];Object.values(appData.replyPhrases).forEach(a=>all.push(...a));if(all.length===0)all.push('😊');let count=Math.floor(Math.random()*3)+1;let s=[],av=[...all];for(let i=0;i<count;i++){if(av.length===0)break;s.push(av.splice(Math.floor(Math.random()*av.length),1)[0]);}if(s.length===0)s.push('😊');let d=0;s.forEach(p=>{setTimeout(()=>{let msg={id:'msg_'+Date.now(),from:'mj',content:p,time:Date.now()};appData.messages.push(msg);saveData();if(currentPage==='chatWindow')renderChatMessages();if(document.hidden&&typeof Notification!=='undefined'&&Notification.permission==='granted'){new Notification('MJ 发来消息',{body:p,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🐱</text></svg>'});}},d);d+=600+Math.random()*600;});}
function handleChatInputKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChatMessage();}}
function maybeRecordTip(c){if(Math.random()<0.2){let kw=['喜欢','爱','想','要','吃','喝','去','买','看','听','玩','讨厌','不喜欢','害怕','开心','难过','累','困','饿','冷','热'];for(let k of kw){if(c.includes(k)){let tip=`💡 MJ记住了：你说过"${c.substring(0,30)}${c.length>30?'...':''}"`;if(!appData.coupleTips.includes(tip)){appData.coupleTips.push(tip);if(appData.coupleTips.length>50)appData.coupleTips.shift();saveData();setTimeout(()=>addSystemMessage('📝 MJ悄悄记下了你说的话~'),2000+Math.random()*3000);}break;}}}}
function openProfileEditor(t){editingProfileTarget=t;pendingAvatarFile=null;let p=appData.profiles[t];document.getElementById('profileEditCardContent').innerHTML=`<h3>${t==='me'?'编辑我的资料':'编辑 MJ 的资料'}</h3><label>头像</label><div class="file-input-wrapper"><input type="file" id="profileAvatarFile" accept="image/*" onchange="handleAvatarFileSelect(event)"><div class="file-select-btn">📷 从相册选择图片</div></div><label style="margin-top:8px;">或输入图片URL</label><input type="text" id="profileAvatarUrl" value="${escapeHtml(p.avatar||'')}" placeholder="输入图片链接..."><label>名字</label><input type="text" id="profileName" value="${escapeHtml(p.name||'')}" placeholder="输入名字..."><label>状态</label><input type="text" id="profileStatus" value="${escapeHtml(p.status||'')}" placeholder="输入状态..."><div class="flex-between mt-12" style="gap:8px;"><button class="btn-secondary" onclick="closeProfileEditor()" style="flex:1;">取消</button><button class="btn-primary" onclick="saveProfile()" style="flex:1;">保存</button></div>`;document.getElementById('profileEditOverlay').classList.add('show');}

function updateHeaderDisplay(){let mj=appData.profiles['mj'],me=appData.profiles['me'];document.getElementById('headerNameMj').textContent=mj.name||'MJ';document.getElementById('headerStatusMj').textContent=mj.status||'在线';let amj=document.getElementById('headerAvatarMj');amj.innerHTML=mj.avatar?`<img src="${escapeHtml(mj.avatar)}" onerror="this.innerHTML='M'">`:'M';document.getElementById('headerNameMe').textContent=me.name||'我';document.getElementById('headerStatusMe').textContent=me.status||'在线';let ame=document.getElementById('headerAvatarMe');ame.innerHTML=me.avatar?`<img src="${escapeHtml(me.avatar)}" onerror="this.innerHTML='我'">`:'我';}

function navigateTo(page,data=null){currentPage=page;document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));let tp=document.getElementById('page-'+page);if(tp)tp.classList.add('active');document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));let ni=document.querySelector(`[data-page="${page}"]`);if(ni)ni.classList.add('active');let hb=document.getElementById('headerBack'),hul=document.getElementById('headerUserLeft'),hur=document.getElementById('headerUserRight'),ceb=document.getElementById('callEmbedBar');hul.style.display=(page==='chatWindow')?'flex':'none';hur.style.display=(page==='chatWindow')?'flex':'none';if(ceb&&callState.active&&callState.embedMode)ceb.classList.add('show');else if(ceb)ceb.classList.remove('show');hb.classList.remove('show');if(page==='writeLetter'){hb.classList.add('show');hul.style.display='none';hur.style.display='none';if(data&&data.replyTo){document.getElementById('letterTitle').value='Re: '+data.replyTo.title;document.getElementById('letterContent').value='\n\n--- 原信 ---\n'+data.replyTo.content;}}if(page==='chatWindow'){updateHeaderDisplay();startMJStatusAutoSwitch();startMJIncomingCallTimer();startMJAutoWater();startMJSpellTimer();manageBgMsg();startMJAutoMoment();startMJAutoLetter();startMJAutoNudge();}else{stopMJStatusAutoSwitch();stopMJIncomingCallTimer();stopMJAutoWater();stopMJSpellTimer();clearBgMsg();clearMJAutoMoment();clearMJAutoLetter();clearMJAutoNudge();}refreshPage(page);if(page==='chatWindow')scrollChatToBottom();}

function renderChatMessages(){let c=document.getElementById('chatMessages');c.innerHTML=appData.messages.map((m,idx)=>{let mid=m.id||('msg_'+idx);if(m.type==='system')return`<div class="msg-row system"><div class="msg-bubble">🎭 ${escapeHtml(m.content)}</div></div><div class="msg-time">${formatTime(m.time)}</div>`;if(m.type==='nudge')return`<div class="msg-row nudge"><div class="msg-bubble">👋 ${escapeHtml(m.content)}</div></div><div class="msg-time">${formatTime(m.time)}</div>`;if(m.recalled){let isMe=m.from==='me';return`<div class="msg-row ${isMe?'me':'mj'} recalled"><div class="msg-avatar ${getAvatarClass(isMe?'me':'mj')}">${getAvatarHTML(isMe?'me':'mj')}</div><div class="msg-bubble">${isMe?'你':'MJ'}撤回了一条消息 <span class="msg-recalled-hint" onclick="viewRecalledMsg('${mid}')">查看</span></div></div><div class="msg-time">${formatTime(m.time)}</div>`;}let isMe=m.from==='me',key=isMe?'me':'mj';let qHtml='';if(m.quoteId){let quoted=appData.messages.find(x=>(x.id||('msg_'+appData.messages.indexOf(x)))===m.quoteId);if(quoted&&!quoted.recalled)qHtml=`<div class="msg-quote">↩ ${escapeHtml((quoted.content||'').substring(0,50))}</div>`;else if(quoted&&quoted.recalled)qHtml='<div class="msg-quote">↩ 消息已被撤回</div>';}let cont=m.isSpell?`<span class="msg-spell">${escapeHtml(m.content)}</span>`:escapeHtml(m.content);if(m.isCustomEmoji&&m.customEmojiIndex!==undefined&&appData.customEmojis&&appData.customEmojis[m.customEmojiIndex])cont=`<img src="${appData.customEmojis[m.customEmojiIndex]}" class="msg-emoji-img" alt="custom">`;return`<div class="msg-row ${isMe?'me':'mj'}" data-id="${mid}"><div class="msg-actions"><button onclick="quoteMessage('${mid}')">↩ 引用</button><button onclick="recallMessage('${mid}')">↩ 撤回</button></div><div class="msg-avatar ${getAvatarClass(key)}">${getAvatarHTML(key)}</div><div class="msg-bubble">${qHtml}${cont}</div></div><div class="msg-time">${formatTime(m.time)}</div>`;}).join('');if(appData.messages.length===0)c.innerHTML='<div class="empty-state">开始你们的对话吧 ✨</div>';scrollChatToBottom();}
function scrollChatToBottom(){setTimeout(()=>{let w=document.getElementById('chatMessagesWrapper');if(w)w.scrollTop=w.scrollHeight;},100);}
function addSystemMessage(content){appData.messages.push({id:'sys_'+Date.now(),type:'system',content,time:Date.now()});saveData();if(currentPage==='chatWindow')renderChatMessages();}
function recallMessage(mid){let msg=appData.messages.find(m=>(m.id||('msg_'+appData.messages.indexOf(m)))===mid);if(!msg||msg.recalled)return;if(msg.from==='me'){msg.recalled=true;msg.recalledContent=msg.content;msg.content='';saveData();renderChatMessages();}else{if(confirm('确定撤回MJ的消息？')){msg.recalled=true;msg.recalledContent=msg.content;msg.content='';saveData();renderChatMessages();}}}

function openThemeEditor(){document.getElementById('profileEditOverlay').classList.add('show');let card=document.getElementById('profileEditCardContent');let ct=appData.currentTheme||'莫兰迪粉';let html='<h3 style="text-align:center;margin-bottom:12px;">🎨 主题美化设置</h3><p style="font-size:11px;color:var(--text-light);margin-bottom:8px;">选择预设主题或自定义配色</p><div class="theme-preset-grid">';Object.keys(THEME_PRESETS).forEach(key=>{let t=THEME_PRESETS[key];html+=`<div class="theme-preset-item ${key===ct?'active':''}" onclick="applyPresetTheme('${key}')"><div class="theme-preset-preview"><span style="background:${t.messageSelf};"></span><span style="background:${t.messageOther};"></span><span style="background:${t.highlight};"></span></div>${key}</div>`;});html+=`<div class="theme-preset-item ${ct==='自定义'?'active':''}" onclick="showCustomThemeFields()"><div class="theme-preset-preview"><span style="background:#ccc;"></span><span style="background:#ddd;"></span><span style="background:#bbb;"></span></div>自定义</div></div><div id="customThemeFields" style="display:none;margin-top:8px;">`;let fields=['primary','secondary','accent','highlight','text','textLight','messageSelf','messageOther','avatarMe','avatarMj','bubbleRadiusMe','bubbleRadiusOther'];let curTheme=(ct==='自定义'&&appData.customTheme)?appData.customTheme:THEME_PRESETS['莫兰迪粉'];fields.forEach(f=>{html+=`<label>${f}</label><input type="text" id="custom_${f}" value="${curTheme[f]||''}">`;});html+='<button class="btn-primary mt-8" onclick="saveCustomTheme()" style="width:100%;">💾 保存自定义主题</button></div><button class="btn-secondary mt-8" onclick="closeProfileEditor()" style="width:100%;">关闭</button>';card.innerHTML=html;if(ct==='自定义')document.getElementById('customThemeFields').style.display='block';}

function initiateIncomingCall(){callState={active:true,direction:'incoming',startTime:null,timerInterval:null,answered:false,minimized:false,embedMode:false,incoming:true};document.getElementById('callFullscreenOverlay').classList.add('show');document.getElementById('callVideoPreview').classList.add('show');document.getElementById('callFsStatus').textContent='MJ 视频来电... 📹';document.getElementById('callFsTimer').style.display='none';document.getElementById('callFsActions').style.display='none';document.getElementById('callFsActionsIncoming').style.display='flex';document.getElementById('videoCallBtn').classList.add('calling');callState._incomingTimeout=setTimeout(()=>{if(callState.active&&callState.incoming&&!callState.answered)endCall('missed');},30000);}

function initiateCall(dir){if(callState.active)return;callState={active:true,direction:dir||'outgoing',startTime:null,timerInterval:null,answered:false,minimized:false,embedMode:false,incoming:false};document.getElementById('callFullscreenOverlay').classList.add('show');document.getElementById('callVideoPreview').classList.add('show');document.getElementById('callFsStatus').textContent='正在视频呼叫 MJ...';document.getElementById('callFsTimer').style.display='none';document.getElementById('callFsActions').style.display='flex';document.getElementById('callFsActionsIncoming').style.display='none';document.getElementById('videoCallBtn').classList.add('calling');let d=2000+Math.random()*2000;callState._answerTimeout=setTimeout(()=>{if(callState.active&&!callState.answered){let rand=Math.random();if(rand<0.25)endCall('busy');else if(rand<0.45)endCall('missed');else acceptCallInternal();}},d);}

function updateAllTimers(){if(!callState.startTime)return;let e=Math.floor((Date.now()-callState.startTime)/1000);let ts=String(Math.floor(e/60)).padStart(2,'0')+':'+String(e%60).padStart(2,'0');document.getElementById('embedTimer').textContent=ts;document.getElementById('draggableMiniTimer').textContent=ts;document.getElementById('callFsTimer').textContent=ts;}
function minimizeCallToDraggable(){if(!callState.active||!callState.answered)return;callState.minimized=true;callState.embedMode=false;document.getElementById('callFullscreenOverlay').classList.remove('show');document.getElementById('callEmbedBar').classList.remove('show');let mini=document.getElementById('draggableMiniCall');mini.innerHTML='<span>📹</span><span class="mini-timer">'+document.getElementById('embedTimer').textContent+'</span><button onclick="event.stopPropagation();restoreCallFromDraggable()">↗</button><button onclick="event.stopPropagation();endCall(\'reject\')">✕</button>';mini.classList.add('show');mini.style.left='20px';mini.style.top='100px';document.getElementById('videoCallBtn').classList.remove('calling');initDrag();}
function minimizeCallFromFullscreen(){if(!callState.active||!callState.answered)return;callState.minimized=true;callState.embedMode=false;document.getElementById('callFullscreenOverlay').classList.remove('show');document.getElementById('callEmbedBar').classList.remove('show');let mini=document.getElementById('draggableMiniCall');mini.innerHTML='<span>📹</span><span class="mini-timer">'+document.getElementById('callFsTimer').textContent+'</span><button onclick="event.stopPropagation();restoreCallFromDraggable()">↗</button><button onclick="event.stopPropagation();endCall(\'reject\')">✕</button>';mini.classList.add('show');mini.style.left='20px';mini.style.top='100px';document.getElementById('videoCallBtn').classList.remove('calling');initDrag();}
function restoreCallFromDraggable(){callState.minimized=false;callState.embedMode=true;document.getElementById('draggableMiniCall').classList.remove('show');document.getElementById('callEmbedBar').classList.add('show');}
function endCall(reason){clearTimeout(callState._answerTimeout);clearTimeout(callState._incomingTimeout);clearInterval(callState.timerInterval);let wa=callState.active,wans=callState.answered;let dur=wans&&callState.startTime?Math.floor((Date.now()-callState.startTime)/1000):0;let dir=callState.direction,inc=callState.incoming;callState={active:false,direction:'outgoing',startTime:null,timerInterval:null,answered:false,minimized:false,embedMode:false,incoming:false};document.getElementById('callFullscreenOverlay').classList.remove('show');document.getElementById('callVideoPreview').classList.remove('show');document.getElementById('callEmbedBar').classList.remove('show');document.getElementById('draggableMiniCall').classList.remove('show');document.getElementById('videoCallBtn').classList.remove('calling');if(wa){let s='missed';if(reason==='busy')s='busy';else if(reason==='reject'&&wans)s='answered';else if(reason==='reject'&&!wans)s='missed';else if(reason==='missed')s='missed';else if(wans)s='answered';let caller=dir==='incoming'?'mj':'me';appData.callLogs.push({id:'cl'+Date.now(),caller,type:'video',status:s,time:Date.now(),duration:dur});saveData();if(s==='busy')addSystemMessage('📹 MJ 正在忙线中……');else if(s==='missed'&&inc)addSystemMessage('📹 你错过了 MJ 的视频来电……');else if(s==='missed'&&dir==='outgoing')addSystemMessage('📹 MJ 没有接听……');else if(s==='answered'&&wans)addSystemMessage(`📹 视频通话结束，时长 ${formatDuration(dur)}`);}}
function initDrag(){let el=document.getElementById('draggableMiniCall');el.onpointerdown=function(e){if(e.target.tagName==='BUTTON')return;let sx=e.clientX,sy=e.clientY,sl=parseInt(el.style.left)||0,st=parseInt(el.style.top)||0;el.setPointerCapture(e.pointerId);el.onpointermove=function(e){el.style.left=(sl+e.clientX-sx)+'px';el.style.top=(st+e.clientY-sy)+'px';};el.onpointerup=function(){el.onpointermove=null;el.onpointerup=null;};};}
function formatDuration(s){return Math.floor(s/60)+'分'+(s%60)+'秒';}
function renderAppDesktop(){let apps=[{id:'phrases',icon:'🐟',name:'词条库',color:'#c9bdb5'},{id:'role',icon:'🐈',name:'角色经历',color:'#d4c5bd'},{id:'decide',icon:'😸',name:'帮我决定',color:'#e0d5cc'},{id:'checkin',icon:'🐾',name:'查看手机',color:'#b8c5c8'},{id:'gomoku',icon:'🎯',name:'五子棋',color:'#8b6b5a'},{id:'spelling',icon:'🔤',name:'拼字板',color:'#6b7b8d'},{id:'callLogs',icon:'📋',name:'通话记录',color:'#a8b8b5'},{id:'couple',icon:'💕',name:'情侣空间',color:'#f0d8d8'},{id:'mjStatus',icon:'🎭',name:'MJ状态库',color:'#b8a9c9'},{id:'nudgeSetting',icon:'👋',name:'拍一拍',color:'#d4b5b5'}];document.getElementById('appDesktop').innerHTML=apps.map(a=>`<div class="app-desktop-icon" onclick="openToolApp('${a.id}')"><div class="app-icon-circle" style="background:${a.color};">${a.icon}</div><span class="app-label">${a.name}</span></div>`).join('');}
function openToolApp(appId){if(appId==='couple'){openCoupleSpace();return;}if(appId==='spelling'){openSpellBoard();return;}if(appId==='gomoku'){openGomoku();return;}if(appId==='mjStatus'){openMJStatusEditor();return;}if(appId==='nudgeSetting'){openNudgeSetting();return;}document.getElementById('fullscreenOverlay').classList.add('show');let content=document.getElementById('fullscreenContent');switch(appId){case'phrases':document.getElementById('fullscreenTitle').textContent='🐟 词条库';content.innerHTML=renderPhraseManager();break;case'role':document.getElementById('fullscreenTitle').textContent='🐈 角色经历';content.innerHTML=`<p class="text-light" style="font-size:11px;margin-bottom:8px;">💡 此设定仅影响"查看手机"中各应用的故事生成。</p><textarea id="roleExperienceFull" style="width:100%;min-height:200px;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg);font-size:13px;font-family:var(--font);color:var(--text);outline:none;resize:vertical;line-height:1.5;">${escapeHtml(appData.roleExperience)}</textarea><button class="btn-primary mt-8" onclick="saveRoleFull()" style="width:100%;">💾 保存</button>`;break;case'decide':document.getElementById('fullscreenTitle').textContent='😸 帮我决定';content.innerHTML=`<input type="text" id="decideQ" placeholder="问题..." style="width:100%;padding:9px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg);font-size:13px;margin-bottom:6px;outline:none;"><input type="text" id="decideO" placeholder="选项（如：A.火锅 B.烧烤 C.日料 D.披萨）" style="width:100%;padding:9px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg);font-size:13px;margin-bottom:6px;outline:none;"><button class="btn-primary" onclick="helpDecideFull()" style="width:100%;">🎲 MJ帮我选</button><div id="decideResultFull"></div>`;break;case'checkin':document.getElementById('fullscreenTitle').textContent='🐾 查看手机';content.innerHTML='<div style="display:flex;gap:8px;"><button class="btn-primary" onclick="openPhoneDesktop(\'mj\');closeFullscreen();" style="flex:1;">📱 MJ的手机</button><button class="btn-primary" onclick="openPhoneDesktop(\'me\');closeFullscreen();" style="flex:1;">📱 我的手机</button></div>';break;case'callLogs':document.getElementById('fullscreenTitle').textContent='📋 通话记录';content.innerHTML='<div id="callLogsListFull"></div>';renderCallLogsFull();break;}}
function closeFullscreen(){document.getElementById('fullscreenOverlay').classList.remove('show');}
function openCoupleSpace(){document.getElementById('fullscreenOverlay').classList.add('show');document.getElementById('fullscreenTitle').textContent='💕 情侣空间';let days=Math.floor((Date.now()-appData.coupleStartDate)/86400000),level=appData.treeWaterLevel||0;let treeEmoji=getTreeEmoji(level),progressWidth=Math.min(100,level);let meP=appData.profiles['me'],mjP=appData.profiles['mj'];let canWaterMe=canWater('me');document.getElementById('fullscreenContent').innerHTML=`<div class="couple-card"><div class="couple-avatars"><div class="couple-avatar-lg av-me">${meP.avatar?`<img src="${escapeHtml(meP.avatar)}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`:'我'}</div><div class="couple-heart">💕</div><div class="couple-avatar-lg av-mj">${mjP.avatar?`<img src="${escapeHtml(mjP.avatar)}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`:'M'}</div></div><div class="couple-days" onclick="editCoupleStartDate()">我们已经在一起 <b>${days}</b> 天啦 🎉<br><span style="font-size:10px;">点击修改纪念日</span></div><div class="couple-tree">${treeEmoji}</div><div class="tree-progress-bar"><div class="tree-progress-fill" style="width:${progressWidth}%;"></div></div><p style="color:var(--text-light);font-size:11px;">浇水进度：${progressWidth}%</p><div class="couple-actions mt-8"><button class="couple-action-btn" onclick="waterTree('me')" ${canWaterMe?'':'disabled style="opacity:0.5;cursor:not-allowed;"'}>💧 我浇水 (${canWaterMe?'可浇':'已浇'})</button></div><div class="couple-actions mt-8"><button class="couple-action-btn" onclick="addCoupleMemory()">💝 添加纪念日</button></div><div class="couple-tips"><p style="font-size:11px;color:var(--text-light);margin-bottom:4px;">📝 MJ记住的关于你的小tips</p>${appData.coupleTips.length===0?'<p style="font-size:11px;color:#ccc;">在聊天中说出你的喜好，MJ会悄悄记下来~</p>':appData.coupleTips.slice(-10).reverse().map(t=>`<div class="couple-tip-item"><span>${escapeHtml(t)}</span><button onclick="deleteTip('${escapeHtml(t)}')">×</button></div>`).join('')}</div></div>`;}
function canWater(who){let today=new Date().toDateString();let last=who==='me'?(appData.lastWaterDateMe||''):(appData.lastWaterDateMj||'');return last!==today;}
function getTreeEmoji(l){if(l>=100)return'🌸💖🌳💖🌸';if(l>=90)return'🌳💕';if(l>=60)return'🌲✨';if(l>=30)return'🌿🪴';return'🌱';}
function waterTree(who){if(!canWater(who)){alert('今天已经浇过水啦~');return;}appData.treeWaterLevel=(appData.treeWaterLevel||0)+1;if(appData.treeWaterLevel>100)appData.treeWaterLevel=100;if(who==='me')appData.lastWaterDateMe=new Date().toDateString();saveData();openCoupleSpace();let l=appData.treeWaterLevel;if(l===100)addSystemMessage('🌸 你给爱情树浇了水，爱情树盛开了！💖');else if(l===90)addSystemMessage('🌳 你给爱情树浇了水，快要开花啦！💕');else if(l===60)addSystemMessage('🌲 你给爱情树浇了水，树更高了！✨');else if(l===30)addSystemMessage('🪴 你给爱情树浇了水，树苗长高了~ 🌿');else addSystemMessage('💧 你给爱情树浇了水~ 🌱');}
function editCoupleStartDate(){let d=new Date(appData.coupleStartDate);let ds=d.toISOString().split('T')[0];let nd=prompt('输入日期（YYYY-MM-DD）：',ds);if(nd&&/^\d{4}-\d{2}-\d{2}$/.test(nd)){appData.coupleStartDate=new Date(nd).getTime();saveData();openCoupleSpace();}else if(nd)alert('格式不正确');}
function addCoupleMemory(){let t=prompt('输入纪念日内容：','第一次见面 💕');if(t){appData.coupleMemories.push(t);saveData();openCoupleSpace();}}
function deleteTip(tip){appData.coupleTips=appData.coupleTips.filter(x=>x!==tip);saveData();openCoupleSpace();}
function renderPhraseManager(){let html='<div id="phraseCategories">';Object.keys(appData.replyPhrases).forEach(cat=>{html+=`<div class="phrase-category"><h4>📁 ${escapeHtml(cat)} <span class="phrase-category-btns"><button onclick="renameCategory('${escapeHtml(cat)}')">✏️</button><button onclick="deleteCategory('${escapeHtml(cat)}')">🗑️</button></span></h4><div class="phrase-list">`;appData.replyPhrases[cat].forEach((p,i)=>{html+=`<span class="phrase-tag">${escapeHtml(p)}<button onclick="deletePhraseInCat('${escapeHtml(cat)}',${i})">×</button></span>`;});html+=`</div><div class="flex-between mt-8"><textarea id="newPhrase-${escapeHtml(cat)}" placeholder="批量添加词条，一行一个..." style="flex:1;padding:5px 10px;border-radius:12px;border:1px solid var(--border);font-size:11px;outline:none;resize:none;height:40px;"></textarea><button class="btn-sm btn-primary" onclick="addPhraseToCat('${escapeHtml(cat)}')" style="margin-left:4px;">+</button></div></div>`;});html+=`</div><div class="flex-between mt-12"><input type="text" id="newCategoryName" placeholder="新分类名称..." style="flex:1;padding:8px 12px;border-radius:14px;border:1px solid var(--border);font-size:12px;outline:none;"><button class="btn-primary" onclick="addCategory()" style="margin-left:8px;">+ 新建分类</button></div>`;return html;}
function addCategory(){let n=document.getElementById('newCategoryName')?.value.trim();if(!n||appData.replyPhrases[n])return;appData.replyPhrases[n]=[];saveData();document.getElementById('fullscreenContent').innerHTML=renderPhraseManager();}
function renameCategory(old){let n=prompt('新分类名称：',old);if(!n||!n.trim())return;let t=n.trim();if(t===old)return;if(appData.replyPhrases[t]){alert('该名称已存在');return;}appData.replyPhrases[t]=appData.replyPhrases[old];delete appData.replyPhrases[old];saveData();document.getElementById('fullscreenContent').innerHTML=renderPhraseManager();}
function deleteCategory(cat){if(confirm(`删除"${cat}"？`)){delete appData.replyPhrases[cat];saveData();document.getElementById('fullscreenContent').innerHTML=renderPhraseManager();}}
function addPhraseToCat(cat){let textarea=document.getElementById('newPhrase-'+cat);if(!textarea)return;let text=textarea.value.trim();if(!text)return;let phrases=text.split('\n').filter(p=>p.trim()!=='');phrases.forEach(p=>{appData.replyPhrases[cat].push(p.trim());});textarea.value='';saveData();document.getElementById('fullscreenContent').innerHTML=renderPhraseManager();}
function deletePhraseInCat(cat,i){appData.replyPhrases[cat].splice(i,1);saveData();document.getElementById('fullscreenContent').innerHTML=renderPhraseManager();}
function saveRoleFull(){appData.roleExperience=document.getElementById('roleExperienceFull').value.trim();saveData();alert('已保存！');}
function helpDecideFull(){let q=document.getElementById('decideQ').value.trim(),o=document.getElementById('decideO').value.trim(),r=document.getElementById('decideResultFull');if(!q&&!o){r.innerHTML='<p>请先输入问题哦~</p>';return;}let opts=[];if(o){let m=o.match(/([A-Za-z])[\.\、\:\)]\s*([^A-Za-z]*)/g);if(m)opts=m.map(x=>{let l=x.charAt(0).toUpperCase();return{letter:l,text:x.replace(/^[A-Za-z][\.\、\:\)]\s*/,'').trim()||l};});else opts=o.split(/[\/,，、]/).filter(s=>s.trim()).map((s,i)=>({letter:String.fromCharCode(65+i),text:s.trim()}));}if(opts.length===0&&q)opts=[{letter:'A',text:'是'},{letter:'B',text:'否'}];let mc=['#f8c8d8','#c8ddf8','#c8f0e8','#e0d4f5','#fce4c8'];let sel=opts[Math.floor(Math.random()*opts.length)];r.innerHTML=`<div class="decide-result-macaron" style="background:${mc[Math.floor(Math.random()*5)]};">✨ MJ选了 <b>${sel.letter}</b>${sel.text?' — '+sel.text:''} ✨</div>`;}
function renderCallLogsFull(){let c=document.getElementById('callLogsListFull');if(!c)return;let s=[...appData.callLogs].sort((a,b)=>b.time-a.time);if(s.length===0){c.innerHTML='<div class="empty-state">暂无通话记录</div>';return;}c.innerHTML=s.map(log=>`<div class="call-log-item"><span class="call-log-icon">📹</span><div class="call-log-info"><div class="call-log-desc">${log.caller==='me'?'我打给 MJ':'MJ 打给我'}</div><div class="call-log-detail">${formatTime(log.time)}${log.status==='answered'?' | 通话 '+formatDuration(log.duration):''}</div></div><span class="call-log-status status-${log.status}">${log.status==='answered'?'已接通':log.status==='missed'?'未接通':'忙线'}</span></div>`).join('');}
function renderMoments(){let c=document.getElementById('momentsList'),s=[...appData.moments].sort((a,b)=>b.time-a.time);c.innerHTML=s.map(m=>`<div class="moment-card"><div class="moment-header"><div class="moment-avatar ${m.author}">${m.author==='me'?'我':'M'}</div><div><div class="moment-author">${m.author==='me'?'我':'MJ'}</div><div class="moment-time">${formatTime(m.time)}</div></div></div><div class="moment-content">${escapeHtml(m.content)}</div><div class="moment-comments">${(m.comments||[]).map(c=>`<div class="moment-comment"><span class="comment-author">${c.author==='me'?'我':'MJ'}：</span><span>${escapeHtml(c.content)}</span></div>`).join('')}</div><div class="comment-input-row"><input class="comment-input" id="commentInput-${m.id}" placeholder="写评论..."><button class="comment-send" onclick="addComment('${m.id}')">发送</button></div></div>`).join('');if(s.length===0)c.innerHTML='<div class="empty-state">还没有动态 🐾</div>';}
function postMoment(){let c=document.getElementById('momentContent').value.trim();if(!c)return;appData.moments.push({id:'m'+Date.now(),author:'me',content:c,time:Date.now(),comments:[]});document.getElementById('momentContent').value='';saveData();renderMoments();}
function addComment(mid){let inp=document.getElementById('commentInput-'+mid),c=inp.value.trim();if(!c)return;let m=appData.moments.find(x=>x.id===mid);if(m){m.comments.push({author:'me',content:c,time:Date.now()});saveData();renderMoments();}}
function renderDiaries(){let c=document.getElementById('diaryList'),s=[...appData.diaries].sort((a,b)=>b.time-a.time);c.innerHTML=s.map(d=>`<div class="diary-card"><div class="diary-header"><span class="diary-date">📅 ${formatDate(d.time)}</span><span class="diary-author-tag">${d.author==='me'?'我的日记':'MJ的日记'}</span></div><div class="diary-title">${escapeHtml(d.title||'无标题')}</div><div class="diary-content">${escapeHtml(d.content)}</div><button class="btn-sm btn-secondary mt-8" onclick="deleteDiary('${d.id}')">删除</button></div>`).join('');if(s.length===0)c.innerHTML='<div class="empty-state">还没有日记 📖</div>';}
function postDiary(){let t=document.getElementById('diaryTitle').value.trim(),c=document.getElementById('diaryContent').value.trim();if(!c)return;appData.diaries.push({id:'d'+Date.now(),author:'me',title:t||'无标题',content:c,time:Date.now()});document.getElementById('diaryTitle').value='';document.getElementById('diaryContent').value='';saveData();renderDiaries();}
function deleteDiary(id){appData.diaries=appData.diaries.filter(d=>d.id!==id);saveData();renderDiaries();}
function setLetterFilter(f){letterFilter=f;updateLetterFilterButtons();renderLetters();}
function updateLetterFilterButtons(){let all=document.getElementById('letterFilterAll'),rec=document.getElementById('letterFilterReceived'),sen=document.getElementById('letterFilterSent');if(all)all.style.fontWeight=(letterFilter==='all'?'600':'400');if(rec)rec.style.fontWeight=(letterFilter==='received'?'600':'400');if(sen)sen.style.fontWeight=(letterFilter==='sent'?'600':'400');}
function renderLetters(){let c=document.getElementById('lettersList'),s=[...appData.letters].sort((a,b)=>b.time-a.time);if(letterFilter==='received')s=s.filter(l=>l.from==='mj');if(letterFilter==='sent')s=s.filter(l=>l.from==='me');c.innerHTML=s.map(l=>`<div class="letter-card ${l.replyToId?'reply':''}">${l.replyToId?'<span style="color:var(--highlight);font-size:10px;">💌 回信</span>':''}<div class="letter-from">✉️ ${l.from==='me'?'我':'MJ'} → ${l.from==='me'?'MJ':'我'}</div><div class="letter-title">${escapeHtml(l.title)}</div><div class="letter-content">${escapeHtml(l.content)}</div><div class="letter-time">${formatTime(l.time)}</div><button class="letter-reply-btn" onclick="replyLetter('${l.id}')">↩ 回信</button></div>`).join('');if(s.length===0)c.innerHTML='<div class="empty-state">📭 暂无信件</div>';}
function showWriteLetter(){document.getElementById('letterTitle').value='';document.getElementById('letterContent').value='';navigateTo('writeLetter');}
function replyLetter(lid){let l=appData.letters.find(x=>x.id===lid);if(l)navigateTo('writeLetter',{replyTo:l});}
function sendLetter(){let t=document.getElementById('letterTitle').value.trim(),c=document.getElementById('letterContent').value.trim();if(!c)return;appData.letters.push({id:'l'+Date.now(),from:'me',title:t,content:c,time:Date.now(),replyToId:null});saveData();navigateTo('letters');}
function openPhoneDesktop(owner){currentPhoneOwner=owner;document.getElementById('phoneDesktopOverlay').classList.add('show');document.getElementById('desktopTime').textContent=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});renderDesktopApps();document.getElementById('thoughtBubble').style.display='none';startThoughtBubble();if(owner==='me'){setTimeout(()=>{addSystemMessage('🔔 MJ 正在查看你的手机…');},1500);}}
function closePhoneDesktop(){document.getElementById('phoneDesktopOverlay').classList.remove('show');clearInterval(thoughtInterval);}
function renderDesktopApps(){let apps=[{id:'calls',icon:'🐱',name:'通话记录',color:'#c9bdb5'},{id:'messages',icon:'😸',name:'短信',color:'#b8c5c8'},{id:'wallet',icon:'🐟',name:'钱包',color:'#d4c5bd'},{id:'memo',icon:'🐾',name:'备忘录',color:'#e0d5cc'},{id:'browser',icon:'🐈',name:'浏览器',color:'#a8b8b5'},{id:'shopping',icon:'🦴',name:'购物',color:'#e8ddd5'},{id:'role',icon:'😻',name:'角色经历',color:'#d5ddd8'}];document.getElementById('desktopApps').innerHTML=apps.map(a=>`<div class="phone-app-icon" onclick="openPhoneApp('${a.id}')"><div class="app-icon-bg" style="background:${a.color};">${a.icon}</div><span class="app-name">${a.name}</span></div>`).join('');}
function openPhoneApp(appId){document.getElementById('thoughtBubble').style.display='none';document.getElementById('phoneAppPopupOverlay').classList.add('show');document.getElementById('phoneAppPopup').classList.add('show');let titles={calls:'🐱 通话记录',messages:'😸 短信',wallet:'🐟 钱包',memo:'🐾 备忘录',browser:'🐈 浏览器',shopping:'🦴 购物',role:'😻 角色经历'};document.getElementById('phoneAppPopupTitle').textContent=titles[appId]||'应用';document.getElementById('phoneAppPopupContent').innerHTML=generatePhoneAppContent(appId);}
function closePhoneAppPopup(){document.getElementById('phoneAppPopupOverlay').classList.remove('show');document.getElementById('phoneAppPopup').classList.remove('show');}
function generatePhoneAppContent(appId){let role=appData.roleExperience||'MJ是一个温柔细腻的设计师。';switch(appId){case'calls':return generateCallLogsForPhone();case'messages':return generateMessagesForPhone(role);case'wallet':return generateWalletForPhone(role);case'memo':return generateMemoForPhone(role);case'browser':return generateBrowserForPhone(role);case'shopping':return generateShoppingForPhone(role);case'role':return`<div style="white-space:pre-wrap;padding:10px;background:#f9f9f9;">${escapeHtml(role)}</div>`;default:return'<p>加载中...</p>';}}
function generateCallLogsForPhone(){let logs=[...appData.callLogs].sort((a,b)=>b.time-a.time).slice(0,5);let h='';if(logs.length===0)h+='<p>暂无通话记录</p>';else h+=logs.map(l=>`<div style="padding:9px;border-bottom:1px solid #e8e0d8;display:flex;justify-content:space-between;"><span>🐱 ${l.caller==='me'?'我 → MJ':'MJ → 我'}</span><span style="color:#888;font-size:11px;">${formatTime(l.time)} ${l.status==='answered'?'已接通':l.status==='missed'?'未接':'忙线'}</span></div>`).join('');return h;}
function generateMessagesForPhone(role){return '<div style="padding:9px;">短信内容...</div>';}
function generateWalletForPhone(role){return`<div style="text-align:center;padding:18px;background:linear-gradient(135deg,#c9bdb5,#b8a9a0);color:#fff;border-radius:12px;"><p>🐟 余额</p><h2>¥${(Math.random()*5000+500).toFixed(2)}</h2></div>`;}
function generateMemoForPhone(role){return'<div style="background:#fffde7;padding:10px;border-radius:8px;"><strong>🐾 备忘录</strong><pre>内容...</pre></div>';}
function generateBrowserForPhone(role){return'<div style="padding:10px;">浏览器记录...</div>';}
function generateShoppingForPhone(role){return'<div style="padding:10px;">购物车...</div>';}
function startThoughtBubble(){clearInterval(thoughtInterval);let thoughts=['好想喝杯热咖啡...☕'];let b=document.getElementById('thoughtBubble');b.style.display='block';b.textContent=thoughts[0];thoughtInterval=setInterval(()=>{if(Math.random()<0.4){b.textContent=thoughts[0];b.style.display='block';}else b.style.display='none';},4000);}
function formatTime(t){let d=new Date(t),now=new Date(),isToday=d.toDateString()===now.toDateString(),yd=new Date(now);yd.setDate(yd.getDate()-1);let ts=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');if(isToday)return'今天 '+ts;if(d.toDateString()===yd.toDateString())return'昨天 '+ts;return(d.getMonth()+1)+'月'+d.getDate()+'日 '+ts;}
function formatDate(t){let d=new Date(t);return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';}
function escapeHtml(s){let d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function requestNotificationPermission(){if(typeof Notification!=='undefined'&&Notification.permission==='default'){Notification.requestPermission();}}
function manageBgMsg(){clearBgMsg();scheduleBgMsg();if(!visibilityBound){document.addEventListener('visibilitychange',onVisibilityChange);visibilityBound=true;}}
function clearBgMsg(){if(bgMsgTimer){clearTimeout(bgMsgTimer);bgMsgTimer=null;}if(visibilityBound){document.removeEventListener('visibilitychange',onVisibilityChange);visibilityBound=false;}}
function onVisibilityChange(){if(document.hidden){if(!bgMsgTimer)scheduleBgMsg();}else{clearBgMsg();if(currentPage==='chatWindow')renderChatMessages();scheduleBgMsg();}}
function scheduleBgMsg(){let d=120000+Math.random()*300000;bgMsgTimer=setTimeout(()=>{generateRandomMJMessage();scheduleBgMsg();},d);}
function generateRandomMJMessage(){let all=[];Object.values(appData.replyPhrases).forEach(a=>all.push(...a));if(all.length===0)all.push('😊');let text=all[Math.floor(Math.random()*all.length)];appData.messages.push({id:'bg_msg_'+Date.now(),from:'mj',content:text,time:Date.now()});saveData();if(document.hidden&&typeof Notification!=='undefined'&&Notification.permission==='granted'){new Notification('MJ 发来消息',{body:text,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🐱</text></svg>'});}else if(!document.hidden&&currentPage==='chatWindow')renderChatMessages();}
function startMJAutoMoment(){clearTimeout(mjAutoMomentTimer);scheduleMJMoment();}
function scheduleMJMoment(){let d=1800000+Math.random()*5400000;mjAutoMomentTimer=setTimeout(()=>{if(MJ_MOMENTS_POOL.length>0){let content=MJ_MOMENTS_POOL[Math.floor(Math.random()*MJ_MOMENTS_POOL.length)];appData.moments.push({id:'m_mj_'+Date.now(),author:'mj',content:content,time:Date.now(),comments:[]});saveData();if(currentPage==='moments')renderMoments();addSystemMessage('🐾 MJ 发布了一条朋友圈~');}scheduleMJMoment();},d);}
function startMJAutoLetter(){clearTimeout(mjAutoLetterTimer);scheduleMJLetter();}
function scheduleMJLetter(){let d=3600000+Math.random()*7200000;mjAutoLetterTimer=setTimeout(()=>{if(MJ_LETTER_TITLES.length>0&&MJ_LETTER_CONTENTS.length>0){let title=MJ_LETTER_TITLES[Math.floor(Math.random()*MJ_LETTER_TITLES.length)];let content=MJ_LETTER_CONTENTS[Math.floor(Math.random()*MJ_LETTER_CONTENTS.length)];appData.letters.push({id:'l_mj_'+Date.now(),from:'mj',title:title,content:content,time:Date.now(),replyToId:null});saveData();if(currentPage==='letters'){updateLetterFilterButtons();renderLetters();}addSystemMessage('✉️ MJ 给你写了一封信~');}scheduleMJLetter();},d);}
function startMJAutoNudge(){clearTimeout(mjAutoNudgeTimer);scheduleMJNudge();}
function scheduleMJNudge(){let d=600000+Math.random()*1800000;mjAutoNudgeTimer=setTimeout(()=>{let text=appData.nudgeTextMJ||'MJ 拍了拍你';appData.messages.push({id:'nudge_mj_'+Date.now(),type:'nudge',content:text,from:'mj',time:Date.now()});saveData();if(currentPage==='chatWindow')renderChatMessages();scheduleMJNudge();},d);}
function sendNudge(){let text=appData.nudgeTextMe||'你拍了拍 MJ';appData.messages.push({id:'nudge_me_'+Date.now(),type:'nudge',content:text,from:'me',time:Date.now()});saveData();if(currentPage==='chatWindow')renderChatMessages();}
function openMJStatusEditor(){document.getElementById('fullscreenOverlay').classList.add('show');document.getElementById('fullscreenTitle').textContent='🎭 MJ状态库（影响自动切换）';renderMJStatusEditor();}
function renderMJStatusEditor(){let pool=appData.mjStatusPool||[];let h=`<p style="font-size:12px;color:var(--text-light);margin-bottom:8px;">当前状态池（MJ会自动从中选择状态）</p>`;pool.forEach((s,i)=>{h+=`<div class="flex-between" style="margin:6px 0;background:#fff;padding:8px;border-radius:8px;"><span>${escapeHtml(s)}</span><button class="btn-sm btn-secondary" onclick="deleteMJStatus(${i})">删除</button></div>`;});h+=`<div class="mt-8"><input type="text" id="newMJStatus" placeholder="输入新状态..." style="padding:8px;border-radius:10px;border:1px solid var(--border);width:70%;outline:none;"><button class="btn-primary btn-sm" onclick="addMJStatus()" style="margin-left:8px;">添加</button></div>`;document.getElementById('fullscreenContent').innerHTML=h;}
function addMJStatus(){let input=document.getElementById('newMJStatus');if(!input)return;let v=input.value.trim();if(!v)return;appData.mjStatusPool.push(v);saveData();renderMJStatusEditor();}
function deleteMJStatus(idx){appData.mjStatusPool.splice(idx,1);saveData();renderMJStatusEditor();}
function openNudgeSetting(){document.getElementById('fullscreenOverlay').classList.add('show');document.getElementById('fullscreenTitle').textContent='👋 拍一拍自定义';renderNudgeSetting();}
function renderNudgeSetting(){let h=`<p style="font-size:12px;color:var(--text-light);margin-bottom:8px;">设置你和MJ的拍一拍文字</p><div style="width:100%;background:#fff;padding:12px;border-radius:12px;margin-bottom:12px;"><label style="font-size:13px;color:var(--text);">你拍 MJ 的文字</label><input type="text" id="nudgeTextMe" value="${escapeHtml(appData.nudgeTextMe||'你拍了拍 MJ')}" style="width:100%;margin-top:4px;padding:8px;border-radius:8px;border:1px solid var(--border);outline:none;"></div><div style="width:100%;background:#fff;padding:12px;border-radius:12px;margin-bottom:12px;"><label style="font-size:13px;color:var(--text);">MJ 拍你的文字</label><input type="text" id="nudgeTextMJ" value="${escapeHtml(appData.nudgeTextMJ||'MJ 拍了拍你')}" style="width:100%;margin-top:4px;padding:8px;border-radius:8px;border:1px solid var(--border);outline:none;"></div><button class="btn-primary" onclick="saveNudgeSetting()" style="width:100%;">💾 保存</button>`;document.getElementById('fullscreenContent').innerHTML=h;}
function saveNudgeSetting(){let meText=document.getElementById('nudgeTextMe')?.value.trim();let mjText=document.getElementById('nudgeTextMJ')?.value.trim();if(meText)appData.nudgeTextMe=meText;if(mjText)appData.nudgeTextMJ=mjText;saveData();closeFullscreen();addSystemMessage('👋 拍一拍文字已更新~');}
function clearMJAutoMoment(){clearTimeout(mjAutoMomentTimer);}
function clearMJAutoLetter(){clearTimeout(mjAutoLetterTimer);}
function clearMJAutoNudge(){clearTimeout(mjAutoNudgeTimer);}
function init(){loadData();updateHeaderDisplay();renderChatMessages();renderAppDesktop();applyChatBackground();applyCurrentTheme();initEmojiPicker();requestNotificationPermission();startMJStatusAutoSwitch();startMJIncomingCallTimer();startMJAutoWater();startMJSpellTimer();startMJAutoMoment();startMJAutoLetter();startMJAutoNudge();manageBgMsg();document.addEventListener('keydown',function(e){if(e.key==='Escape'&&callState.active)endCall('reject');});}
init();
</script></body></html>
